{{- range $index, $resource := .Values.clusterSettings }}
apiVersion: cluster.elasticstack.m.crossplane.io/v1alpha1
kind: ClusterSettings
metadata:
  name: {{ required (printf "%s[%d].name is required" "clusterSettings" $index) $resource.name }}
  namespace: {{ default $.Release.Namespace $resource.namespace }}
  {{- if or $resource.annotations $resource.externalName }}
  annotations:
    {{- if $resource.externalName }}
    crossplane.io/external-name: {{ $resource.externalName | quote }}
    {{- end }}
    {{- with $resource.annotations }}
{{ toYaml . | indent 4 }}
    {{- end }}
  {{- end }}
  {{- if $resource.labels }}
  labels:
{{ toYaml $resource.labels | indent 4 }}
  {{- end }}
{{- $spec := default (dict) $resource.spec }}
spec:
  {{- if hasKey $spec "forProvider" }}
  {{- $clusterSettings_spec_forProvider := default (dict) (index $spec "forProvider") }}
  forProvider:
    {{- if hasKey $clusterSettings_spec_forProvider "elasticsearchConnection" }}
    {{- $clusterSettings_spec_forProvider_elasticsearchConnection := default (list) (index $clusterSettings_spec_forProvider "elasticsearchConnection") }}
    elasticsearchConnection:
    {{- range $clusterSettings_spec_forProvider_elasticsearchConnection_item := $clusterSettings_spec_forProvider_elasticsearchConnection }}
      -
        {{- if hasKey $clusterSettings_spec_forProvider_elasticsearchConnection_item "apiKeySecretRef" }}
        {{- $clusterSettings_spec_forProvider_elasticsearchConnection_apiKeySecretRef := default (dict) (index $clusterSettings_spec_forProvider_elasticsearchConnection_item "apiKeySecretRef") }}
        apiKeySecretRef:
          {{- if hasKey $clusterSettings_spec_forProvider_elasticsearchConnection_apiKeySecretRef "key" }}
          key: {{ index $clusterSettings_spec_forProvider_elasticsearchConnection_apiKeySecretRef "key" | quote }}
          {{- end }}
          {{- if hasKey $clusterSettings_spec_forProvider_elasticsearchConnection_apiKeySecretRef "name" }}
          name: {{ index $clusterSettings_spec_forProvider_elasticsearchConnection_apiKeySecretRef "name" | quote }}
          {{- end }}
        {{- end }}
        {{- if hasKey $clusterSettings_spec_forProvider_elasticsearchConnection_item "bearerTokenSecretRef" }}
        {{- $clusterSettings_spec_forProvider_elasticsearchConnection_bearerTokenSecretRef := default (dict) (index $clusterSettings_spec_forProvider_elasticsearchConnection_item "bearerTokenSecretRef") }}
        bearerTokenSecretRef:
          {{- if hasKey $clusterSettings_spec_forProvider_elasticsearchConnection_bearerTokenSecretRef "key" }}
          key: {{ index $clusterSettings_spec_forProvider_elasticsearchConnection_bearerTokenSecretRef "key" | quote }}
          {{- end }}
          {{- if hasKey $clusterSettings_spec_forProvider_elasticsearchConnection_bearerTokenSecretRef "name" }}
          name: {{ index $clusterSettings_spec_forProvider_elasticsearchConnection_bearerTokenSecretRef "name" | quote }}
          {{- end }}
        {{- end }}
        {{- if hasKey $clusterSettings_spec_forProvider_elasticsearchConnection_item "caData" }}
        caData: {{ index $clusterSettings_spec_forProvider_elasticsearchConnection_item "caData" | quote }}
        {{- end }}
        {{- if hasKey $clusterSettings_spec_forProvider_elasticsearchConnection_item "caFile" }}
        caFile: {{ index $clusterSettings_spec_forProvider_elasticsearchConnection_item "caFile" | quote }}
        {{- end }}
        {{- if hasKey $clusterSettings_spec_forProvider_elasticsearchConnection_item "certData" }}
        certData: {{ index $clusterSettings_spec_forProvider_elasticsearchConnection_item "certData" | quote }}
        {{- end }}
        {{- if hasKey $clusterSettings_spec_forProvider_elasticsearchConnection_item "certFile" }}
        certFile: {{ index $clusterSettings_spec_forProvider_elasticsearchConnection_item "certFile" | quote }}
        {{- end }}
        {{- if hasKey $clusterSettings_spec_forProvider_elasticsearchConnection_item "endpointsSecretRef" }}
        {{- $clusterSettings_spec_forProvider_elasticsearchConnection_endpointsSecretRef := default (list) (index $clusterSettings_spec_forProvider_elasticsearchConnection_item "endpointsSecretRef") }}
        endpointsSecretRef:
        {{- range $clusterSettings_spec_forProvider_elasticsearchConnection_endpointsSecretRef_item := $clusterSettings_spec_forProvider_elasticsearchConnection_endpointsSecretRef }}
          -
            {{- if hasKey $clusterSettings_spec_forProvider_elasticsearchConnection_endpointsSecretRef_item "key" }}
            key: {{ index $clusterSettings_spec_forProvider_elasticsearchConnection_endpointsSecretRef_item "key" | quote }}
            {{- end }}
            {{- if hasKey $clusterSettings_spec_forProvider_elasticsearchConnection_endpointsSecretRef_item "name" }}
            name: {{ index $clusterSettings_spec_forProvider_elasticsearchConnection_endpointsSecretRef_item "name" | quote }}
            {{- end }}
        {{- end }}
        {{- end }}
        {{- if hasKey $clusterSettings_spec_forProvider_elasticsearchConnection_item "esClientAuthenticationSecretRef" }}
        {{- $clusterSettings_spec_forProvider_elasticsearchConnection_esClientAuthenticationSecretRef := default (dict) (index $clusterSettings_spec_forProvider_elasticsearchConnection_item "esClientAuthenticationSecretRef") }}
        esClientAuthenticationSecretRef:
          {{- if hasKey $clusterSettings_spec_forProvider_elasticsearchConnection_esClientAuthenticationSecretRef "key" }}
          key: {{ index $clusterSettings_spec_forProvider_elasticsearchConnection_esClientAuthenticationSecretRef "key" | quote }}
          {{- end }}
          {{- if hasKey $clusterSettings_spec_forProvider_elasticsearchConnection_esClientAuthenticationSecretRef "name" }}
          name: {{ index $clusterSettings_spec_forProvider_elasticsearchConnection_esClientAuthenticationSecretRef "name" | quote }}
          {{- end }}
        {{- end }}
        {{- if hasKey $clusterSettings_spec_forProvider_elasticsearchConnection_item "headersSecretRef" }}
        {{- $clusterSettings_spec_forProvider_elasticsearchConnection_headersSecretRef := default (dict) (index $clusterSettings_spec_forProvider_elasticsearchConnection_item "headersSecretRef") }}
        headersSecretRef:
          {{- if hasKey $clusterSettings_spec_forProvider_elasticsearchConnection_headersSecretRef "name" }}
          name: {{ index $clusterSettings_spec_forProvider_elasticsearchConnection_headersSecretRef "name" | quote }}
          {{- end }}
        {{- end }}
        {{- if hasKey $clusterSettings_spec_forProvider_elasticsearchConnection_item "insecure" }}
        insecure: {{ index $clusterSettings_spec_forProvider_elasticsearchConnection_item "insecure" }}
        {{- end }}
        {{- if hasKey $clusterSettings_spec_forProvider_elasticsearchConnection_item "keyDataSecretRef" }}
        {{- $clusterSettings_spec_forProvider_elasticsearchConnection_keyDataSecretRef := default (dict) (index $clusterSettings_spec_forProvider_elasticsearchConnection_item "keyDataSecretRef") }}
        keyDataSecretRef:
          {{- if hasKey $clusterSettings_spec_forProvider_elasticsearchConnection_keyDataSecretRef "key" }}
          key: {{ index $clusterSettings_spec_forProvider_elasticsearchConnection_keyDataSecretRef "key" | quote }}
          {{- end }}
          {{- if hasKey $clusterSettings_spec_forProvider_elasticsearchConnection_keyDataSecretRef "name" }}
          name: {{ index $clusterSettings_spec_forProvider_elasticsearchConnection_keyDataSecretRef "name" | quote }}
          {{- end }}
        {{- end }}
        {{- if hasKey $clusterSettings_spec_forProvider_elasticsearchConnection_item "keyFile" }}
        keyFile: {{ index $clusterSettings_spec_forProvider_elasticsearchConnection_item "keyFile" | quote }}
        {{- end }}
        {{- if hasKey $clusterSettings_spec_forProvider_elasticsearchConnection_item "passwordSecretRef" }}
        {{- $clusterSettings_spec_forProvider_elasticsearchConnection_passwordSecretRef := default (dict) (index $clusterSettings_spec_forProvider_elasticsearchConnection_item "passwordSecretRef") }}
        passwordSecretRef:
          {{- if hasKey $clusterSettings_spec_forProvider_elasticsearchConnection_passwordSecretRef "key" }}
          key: {{ index $clusterSettings_spec_forProvider_elasticsearchConnection_passwordSecretRef "key" | quote }}
          {{- end }}
          {{- if hasKey $clusterSettings_spec_forProvider_elasticsearchConnection_passwordSecretRef "name" }}
          name: {{ index $clusterSettings_spec_forProvider_elasticsearchConnection_passwordSecretRef "name" | quote }}
          {{- end }}
        {{- end }}
        {{- if hasKey $clusterSettings_spec_forProvider_elasticsearchConnection_item "username" }}
        username: {{ index $clusterSettings_spec_forProvider_elasticsearchConnection_item "username" | quote }}
        {{- end }}
    {{- end }}
    {{- end }}
    {{- if hasKey $clusterSettings_spec_forProvider "persistent" }}
    {{- $clusterSettings_spec_forProvider_persistent := default (dict) (index $clusterSettings_spec_forProvider "persistent") }}
    persistent:
      - setting:
        {{- range $settingName, $settingValue := $clusterSettings_spec_forProvider_persistent }}
          - name: {{ $settingName | quote }}
            {{- if kindIs "slice" $settingValue }}
            valueList:
{{ toYaml $settingValue | indent 14 }}
            {{- else }}
            value: {{ $settingValue | toString | quote }}
            {{- end }}
        {{- end }}
    {{- end }}
    {{- if hasKey $clusterSettings_spec_forProvider "transient" }}
    {{- $clusterSettings_spec_forProvider_transient := default (dict) (index $clusterSettings_spec_forProvider "transient") }}
    transient:
      - setting:
        {{- range $settingName, $settingValue := $clusterSettings_spec_forProvider_transient }}
          - name: {{ $settingName | quote }}
            {{- if kindIs "slice" $settingValue }}
            valueList:
{{ toYaml $settingValue | indent 14 }}
            {{- else }}
            value: {{ $settingValue | toString | quote }}
            {{- end }}
        {{- end }}
    {{- end }}
  {{- end }}
  {{- if hasKey $spec "initProvider" }}
  {{- $clusterSettings_spec_initProvider := default (dict) (index $spec "initProvider") }}
  initProvider:
    {{- if hasKey $clusterSettings_spec_initProvider "elasticsearchConnection" }}
    {{- $clusterSettings_spec_initProvider_elasticsearchConnection := default (list) (index $clusterSettings_spec_initProvider "elasticsearchConnection") }}
    elasticsearchConnection:
    {{- range $clusterSettings_spec_initProvider_elasticsearchConnection_item := $clusterSettings_spec_initProvider_elasticsearchConnection }}
      -
        {{- if hasKey $clusterSettings_spec_initProvider_elasticsearchConnection_item "apiKeySecretRef" }}
        {{- $clusterSettings_spec_initProvider_elasticsearchConnection_apiKeySecretRef := default (dict) (index $clusterSettings_spec_initProvider_elasticsearchConnection_item "apiKeySecretRef") }}
        apiKeySecretRef:
          {{- if hasKey $clusterSettings_spec_initProvider_elasticsearchConnection_apiKeySecretRef "key" }}
          key: {{ index $clusterSettings_spec_initProvider_elasticsearchConnection_apiKeySecretRef "key" | quote }}
          {{- end }}
          {{- if hasKey $clusterSettings_spec_initProvider_elasticsearchConnection_apiKeySecretRef "name" }}
          name: {{ index $clusterSettings_spec_initProvider_elasticsearchConnection_apiKeySecretRef "name" | quote }}
          {{- end }}
        {{- end }}
        {{- if hasKey $clusterSettings_spec_initProvider_elasticsearchConnection_item "bearerTokenSecretRef" }}
        {{- $clusterSettings_spec_initProvider_elasticsearchConnection_bearerTokenSecretRef := default (dict) (index $clusterSettings_spec_initProvider_elasticsearchConnection_item "bearerTokenSecretRef") }}
        bearerTokenSecretRef:
          {{- if hasKey $clusterSettings_spec_initProvider_elasticsearchConnection_bearerTokenSecretRef "key" }}
          key: {{ index $clusterSettings_spec_initProvider_elasticsearchConnection_bearerTokenSecretRef "key" | quote }}
          {{- end }}
          {{- if hasKey $clusterSettings_spec_initProvider_elasticsearchConnection_bearerTokenSecretRef "name" }}
          name: {{ index $clusterSettings_spec_initProvider_elasticsearchConnection_bearerTokenSecretRef "name" | quote }}
          {{- end }}
        {{- end }}
        {{- if hasKey $clusterSettings_spec_initProvider_elasticsearchConnection_item "caData" }}
        caData: {{ index $clusterSettings_spec_initProvider_elasticsearchConnection_item "caData" | quote }}
        {{- end }}
        {{- if hasKey $clusterSettings_spec_initProvider_elasticsearchConnection_item "caFile" }}
        caFile: {{ index $clusterSettings_spec_initProvider_elasticsearchConnection_item "caFile" | quote }}
        {{- end }}
        {{- if hasKey $clusterSettings_spec_initProvider_elasticsearchConnection_item "certData" }}
        certData: {{ index $clusterSettings_spec_initProvider_elasticsearchConnection_item "certData" | quote }}
        {{- end }}
        {{- if hasKey $clusterSettings_spec_initProvider_elasticsearchConnection_item "certFile" }}
        certFile: {{ index $clusterSettings_spec_initProvider_elasticsearchConnection_item "certFile" | quote }}
        {{- end }}
        {{- if hasKey $clusterSettings_spec_initProvider_elasticsearchConnection_item "endpointsSecretRef" }}
        {{- $clusterSettings_spec_initProvider_elasticsearchConnection_endpointsSecretRef := default (list) (index $clusterSettings_spec_initProvider_elasticsearchConnection_item "endpointsSecretRef") }}
        endpointsSecretRef:
          {{- toYaml $clusterSettings_spec_initProvider_elasticsearchConnection_endpointsSecretRef | nindent 10 }}
        {{- end }}
        {{- if hasKey $clusterSettings_spec_initProvider_elasticsearchConnection_item "esClientAuthenticationSecretRef" }}
        {{- $clusterSettings_spec_initProvider_elasticsearchConnection_esClientAuthenticationSecretRef := default (dict) (index $clusterSettings_spec_initProvider_elasticsearchConnection_item "esClientAuthenticationSecretRef") }}
        esClientAuthenticationSecretRef:
          {{- if hasKey $clusterSettings_spec_initProvider_elasticsearchConnection_esClientAuthenticationSecretRef "key" }}
          key: {{ index $clusterSettings_spec_initProvider_elasticsearchConnection_esClientAuthenticationSecretRef "key" | quote }}
          {{- end }}
          {{- if hasKey $clusterSettings_spec_initProvider_elasticsearchConnection_esClientAuthenticationSecretRef "name" }}
          name: {{ index $clusterSettings_spec_initProvider_elasticsearchConnection_esClientAuthenticationSecretRef "name" | quote }}
          {{- end }}
        {{- end }}
        {{- if hasKey $clusterSettings_spec_initProvider_elasticsearchConnection_item "headersSecretRef" }}
        headersSecretRef:
          {{- toYaml (default (dict) (index $clusterSettings_spec_initProvider_elasticsearchConnection_item "headersSecretRef")) | nindent 10 }}
        {{- end }}
        {{- if hasKey $clusterSettings_spec_initProvider_elasticsearchConnection_item "insecure" }}
        insecure: {{ index $clusterSettings_spec_initProvider_elasticsearchConnection_item "insecure" }}
        {{- end }}
        {{- if hasKey $clusterSettings_spec_initProvider_elasticsearchConnection_item "keyDataSecretRef" }}
        {{- $clusterSettings_spec_initProvider_elasticsearchConnection_keyDataSecretRef := default (dict) (index $clusterSettings_spec_initProvider_elasticsearchConnection_item "keyDataSecretRef") }}
        keyDataSecretRef:
          {{- if hasKey $clusterSettings_spec_initProvider_elasticsearchConnection_keyDataSecretRef "key" }}
          key: {{ index $clusterSettings_spec_initProvider_elasticsearchConnection_keyDataSecretRef "key" | quote }}
          {{- end }}
          {{- if hasKey $clusterSettings_spec_initProvider_elasticsearchConnection_keyDataSecretRef "name" }}
          name: {{ index $clusterSettings_spec_initProvider_elasticsearchConnection_keyDataSecretRef "name" | quote }}
          {{- end }}
        {{- end }}
        {{- if hasKey $clusterSettings_spec_initProvider_elasticsearchConnection_item "keyFile" }}
        keyFile: {{ index $clusterSettings_spec_initProvider_elasticsearchConnection_item "keyFile" | quote }}
        {{- end }}
        {{- if hasKey $clusterSettings_spec_initProvider_elasticsearchConnection_item "passwordSecretRef" }}
        {{- $clusterSettings_spec_initProvider_elasticsearchConnection_passwordSecretRef := default (dict) (index $clusterSettings_spec_initProvider_elasticsearchConnection_item "passwordSecretRef") }}
        passwordSecretRef:
          {{- if hasKey $clusterSettings_spec_initProvider_elasticsearchConnection_passwordSecretRef "key" }}
          key: {{ index $clusterSettings_spec_initProvider_elasticsearchConnection_passwordSecretRef "key" | quote }}
          {{- end }}
          {{- if hasKey $clusterSettings_spec_initProvider_elasticsearchConnection_passwordSecretRef "name" }}
          name: {{ index $clusterSettings_spec_initProvider_elasticsearchConnection_passwordSecretRef "name" | quote }}
          {{- end }}
        {{- end }}
        {{- if hasKey $clusterSettings_spec_initProvider_elasticsearchConnection_item "username" }}
        username: {{ index $clusterSettings_spec_initProvider_elasticsearchConnection_item "username" | quote }}
        {{- end }}
    {{- end }}
    {{- end }}
    {{- if hasKey $clusterSettings_spec_initProvider "persistent" }}
    {{- $clusterSettings_spec_initProvider_persistent := default (dict) (index $clusterSettings_spec_initProvider "persistent") }}
    persistent:
      - setting:
        {{- range $settingName, $settingValue := $clusterSettings_spec_initProvider_persistent }}
          - name: {{ $settingName | quote }}
            {{- if kindIs "slice" $settingValue }}
            valueList:
{{ toYaml $settingValue | indent 14 }}
            {{- else }}
            value: {{ $settingValue | toString | quote }}
            {{- end }}
        {{- end }}
    {{- end }}
    {{- if hasKey $clusterSettings_spec_initProvider "transient" }}
    {{- $clusterSettings_spec_initProvider_transient := default (dict) (index $clusterSettings_spec_initProvider "transient") }}
    transient:
      - setting:
        {{- range $settingName, $settingValue := $clusterSettings_spec_initProvider_transient }}
          - name: {{ $settingName | quote }}
            {{- if kindIs "slice" $settingValue }}
            valueList:
{{ toYaml $settingValue | indent 14 }}
            {{- else }}
            value: {{ $settingValue | toString | quote }}
            {{- end }}
        {{- end }}
    {{- end }}
  {{- end }}
  {{- if hasKey $spec "managementPolicies" }}
  {{- $clusterSettings_spec_managementPolicies := default (list) (index $spec "managementPolicies") }}
  managementPolicies:
    {{- toYaml $clusterSettings_spec_managementPolicies | nindent 4 }}
  {{- end }}
  {{- if hasKey $spec "providerConfigRef" }}
  {{- $clusterSettings_spec_providerConfigRef := default (dict) (index $spec "providerConfigRef") }}
  providerConfigRef:
    {{- if hasKey $clusterSettings_spec_providerConfigRef "kind" }}
    kind: {{ index $clusterSettings_spec_providerConfigRef "kind" | quote }}
    {{- end }}
    {{- if hasKey $clusterSettings_spec_providerConfigRef "name" }}
    name: {{ index $clusterSettings_spec_providerConfigRef "name" | quote }}
    {{- end }}
  {{- end }}
  {{- if hasKey $spec "writeConnectionSecretToRef" }}
  {{- $clusterSettings_spec_writeConnectionSecretToRef := default (dict) (index $spec "writeConnectionSecretToRef") }}
  writeConnectionSecretToRef:
    {{- if hasKey $clusterSettings_spec_writeConnectionSecretToRef "name" }}
    name: {{ index $clusterSettings_spec_writeConnectionSecretToRef "name" | quote }}
    {{- end }}
  {{- end }}
{{- if lt (add1 $index) (len $.Values.clusterSettings ) }}
---
{{- end }}
{{- end }}
